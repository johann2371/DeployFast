version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: taskmanager-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskmanager_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  taskmanager-api:
    build: .
    container_name: taskmanager-api
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskmanager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: taskmanager_secret_key_2026_certification_eadl4_secure
      JWT_EXPIRATION: 86400000

volumes:
  mysql_data: